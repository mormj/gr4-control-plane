name: Docker CI

on:
  push:
    branches: [ci-docker]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      gnuradio4_ref:
        description: 'GR4 ref to build'
        required: false
        default: 'main'
      gr4_incubator_ref:
        description: 'gr4-incubator ref to build'
        required: false
        default: 'main'
      push_images:
        description: 'Push images to GHCR'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  BUILD_CONTEXT: .
  DOCKERFILE_PATH: ./Dockerfile
  DOCKER_PLATFORMS: linux/amd64
  RUNTIME_IMAGE_NAME: gr4-control-plane-runtime
  SDK_IMAGE_NAME: gr4-control-plane-sdk
  GNURADIO4_REPO: https://github.com/gnuradio/gnuradio4.git
  GNURADIO4_REF: main
  GR4_INCUBATOR_REPO: https://github.com/gnuradio/gr4-incubator.git
  GR4_INCUBATOR_REF: main
  GR_SPLIT_BLOCK_INSTANTIATIONS: ON

jobs:
  docker:
    name: Build and publish images
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve build settings
        id: build-settings
        shell: bash
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          runtime_image="ghcr.io/${owner}/${RUNTIME_IMAGE_NAME}"
          sdk_image="ghcr.io/${owner}/${SDK_IMAGE_NAME}"
          push_images="false"
          if [[ '${{ github.event_name }}' == 'push' ]]; then
            push_images="true"
          elif [[ '${{ github.event_name }}' == 'workflow_dispatch' && '${{ inputs.push_images }}' == 'true' ]]; then
            push_images="true"
          fi
          {
            echo "runtime_image=${runtime_image}"
            echo "sdk_image=${sdk_image}"
            echo "push_images=${push_images}"
            echo "gnuradio4_ref=${{ github.event_name == 'workflow_dispatch' && inputs.gnuradio4_ref || env.GNURADIO4_REF }}"
            echo "gr4_incubator_ref=${{ github.event_name == 'workflow_dispatch' && inputs.gr4_incubator_ref || env.GR4_INCUBATOR_REF }}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.build-settings.outputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate runtime metadata
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.build-settings.outputs.runtime_image }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate SDK metadata
        id: meta-sdk
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.build-settings.outputs.sdk_image }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build SDK image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          target: sdk
          platforms: ${{ env.DOCKER_PLATFORMS }}
          load: ${{ steps.build-settings.outputs.push_images != 'true' }}
          push: ${{ steps.build-settings.outputs.push_images == 'true' }}
          tags: ${{ steps.meta-sdk.outputs.tags }}
          labels: ${{ steps.meta-sdk.outputs.labels }}
          build-args: |
            GNURADIO4_REPO=${{ env.GNURADIO4_REPO }}
            GNURADIO4_REF=${{ steps.build-settings.outputs.gnuradio4_ref }}
            GR4_INCUBATOR_REPO=${{ env.GR4_INCUBATOR_REPO }}
            GR4_INCUBATOR_REF=${{ steps.build-settings.outputs.gr4_incubator_ref }}
            GR_SPLIT_BLOCK_INSTANTIATIONS=${{ env.GR_SPLIT_BLOCK_INSTANTIATIONS }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_URL=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=gr4-control-plane-sdk
          cache-to: type=gha,scope=gr4-control-plane-sdk,mode=max

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          target: runtime
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: ${{ steps.build-settings.outputs.push_images == 'true' }}
          tags: ${{ steps.meta-runtime.outputs.tags }}
          labels: ${{ steps.meta-runtime.outputs.labels }}
          build-args: |
            GNURADIO4_REPO=${{ env.GNURADIO4_REPO }}
            GNURADIO4_REF=${{ steps.build-settings.outputs.gnuradio4_ref }}
            GR4_INCUBATOR_REPO=${{ env.GR4_INCUBATOR_REPO }}
            GR4_INCUBATOR_REF=${{ steps.build-settings.outputs.gr4_incubator_ref }}
            GR_SPLIT_BLOCK_INSTANTIATIONS=${{ env.GR_SPLIT_BLOCK_INSTANTIATIONS }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_URL=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=gr4-control-plane-runtime
          cache-to: type=gha,scope=gr4-control-plane-runtime,mode=max
